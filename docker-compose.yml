# Full-stack local orchestration for the Livraison platform.
#
# Usage:
#   cp .env.docker.example .env
#   docker compose up --build
#
# Brings up PostgreSQL, Redis, the three backend services (identity, shipment,
# tracking), and the three web portals (merchant, admin, driver). Each backend
# owns its own database (created via the init script). Migrations run on start
# through each service's entrypoint command.

name: livraison

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-livraison}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livraison}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      <<: *postgres-env
      POSTGRES_MULTIPLE_DATABASES: identity,shipment,tracking,livraison_core
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-livraison}']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  identity:
    build:
      context: ./services/identity
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/main.js']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_ENV: ${APP_ENV:-dev}
      HTTP_PORT: '3001'
      DATABASE_URL: postgresql://${POSTGRES_USER:-livraison}:${POSTGRES_PASSWORD:-livraison}@postgres:5432/identity?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-at-least-32-characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-at-least-32-characters}
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '2592000'
      JWT_ISSUER: livraison-identity
      JWT_AUDIENCE: livraison-platform
    ports:
      - '3001:3001'
    restart: unless-stopped

  shipment:
    build:
      context: ./services/shipment
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/main.js']
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      APP_ENV: ${APP_ENV:-dev}
      HTTP_PORT: '3002'
      DATABASE_URL: postgresql://${POSTGRES_USER:-livraison}:${POSTGRES_PASSWORD:-livraison}@postgres:5432/shipment?schema=public
      AWB_PREFIX: LV
      AWB_COUNTRY: SA
    ports:
      - '3002:3002'
    restart: unless-stopped

  tracking:
    build:
      context: ./services/tracking
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/main.js']
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      APP_ENV: ${APP_ENV:-dev}
      HTTP_PORT: '3003'
      DATABASE_URL: postgresql://${POSTGRES_USER:-livraison}:${POSTGRES_PASSWORD:-livraison}@postgres:5432/tracking?schema=public
    ports:
      - '3003:3003'
    restart: unless-stopped

  web-merchant:
    build:
      context: .
      dockerfile: apps/web-merchant/Dockerfile
    depends_on:
      - identity
      - shipment
      - tracking
    environment:
      IDENTITY_API_URL: http://identity:3001/api/v1
      SHIPMENT_API_URL: http://shipment:3002/api/v1
      TRACKING_API_URL: http://tracking:3003/api/v1
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
    ports:
      - '3100:3100'
    restart: unless-stopped

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    depends_on:
      - identity
      - shipment
      - tracking
    environment:
      IDENTITY_API_URL: http://identity:3001/api/v1
      SHIPMENT_API_URL: http://shipment:3002/api/v1
      TRACKING_API_URL: http://tracking:3003/api/v1
      DEFAULT_TENANT_SLUG: ${ADMIN_TENANT_SLUG:-platform}
    ports:
      - '3101:3101'
    restart: unless-stopped

  web-driver:
    build:
      context: .
      dockerfile: apps/web-driver/Dockerfile
    depends_on:
      - identity
      - shipment
      - tracking
    environment:
      IDENTITY_API_URL: http://identity:3001/api/v1
      SHIPMENT_API_URL: http://shipment:3002/api/v1
      TRACKING_API_URL: http://tracking:3003/api/v1
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
    ports:
      - '3102:3102'
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
